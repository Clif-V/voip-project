<!DOCTYPE html>
<html>
<head>
    <title>Diffie</title>
    <link rel="stylesheet" href="./CSS/app.css?v=2">
    <!-- Restore saved theme before first paint to avoid flash -->
    <script>try{const s=JSON.parse(localStorage.getItem('theme')||'{}');for(const[k,v]of Object.entries(s))document.documentElement.style.setProperty(k,v);}catch(e){}</script>
</head>
<body>
    <div id="app">

        <!-- Left sidebar -->
        <aside id="sidebar">
            <div id="sidebar-header">
                <div>
                    <span id="usernameDisplay">Loading...</span>
                    <button id="settingsBtn" title="Settings">&#9881;</button>
                </div>
                <button id="logoutBtn">Logout</button>
            </div>

            <div id="addFriendSection">
                <input id="usernameInput" type="text" placeholder="Add friend by username">
                <button id="addFriendBtn">Add</button>
            </div>

            <div id="requestsSection">
                <button id="toggleRequestsBtn">
                    Friend Requests
                    <div>
                        <span id="outgoingRequestBadge"></span>
                        <span id="incomingRequestBadge"></span>
                    </div>
                </button>
                <div id="requestsDropdown" style="display:none;">
                    <h4>Incoming</h4>
                    <ul id="friendRequestList"></ul>
                    <h4>Outgoing</h4>
                    <ul id="outgoingFriendRequestList"></ul>
                </div>
            </div>

            <div id="friendsListSection">
                <div id="friendsListHeader">Friends</div>
                <ul id="friendsList"></ul>
            </div>
        </aside>

        <!-- Main panel -->
        <main id="mainPanel">

            <div id="noSelectionView">
                <p>Select a friend to chat or call</p>
            </div>

            <div id="friendView">
                <div id="friendViewHeader">
                    <span id="selectedFriendName"></span>
                    <button id="callBtn">Call</button>
                    <button id="endCallBtn">End Call</button>
                </div>

                <div id="callControls">
                    <button id="micBtn">Enable Mic</button>
                    <button id="micToggle">Mute / Unmute</button>
                    <p id="micStatus">Mic: Not enabled</p>
                    <p id="volumeLevel">Volume: 0</p>
                    <div id="remoteMicStatus">Remote user state unknown</div>
                </div>

                <div id="messageArea">
                    <div id="messages"></div>
                    <div id="messageInputArea">
                        <input id="messageInput" type="text" placeholder="Type a message...">
                        <button id="sendMessageBtn">Send</button>
                    </div>
                </div>
            </div>

            <!-- Incoming call overlay -->
            <div id="incomingCall">
                <p id="callerText">Incoming call...</p>
                <button id="acceptCallBtn">Accept</button>
                <button id="rejectCallBtn">Reject</button>
            </div>

        </main>
    </div>

    <!-- Settings overlay -->
    <div id="settingsOverlay">
        <div id="settingsModal">
            <h2>Appearance</h2>
            <div class="settings-row">
                <label>Background</label>
                <input type="color" id="pickerBg">
            </div>
            <div class="settings-row">
                <label>Surface</label>
                <input type="color" id="pickerSurface">
            </div>
            <div class="settings-row">
                <label>Border / Header</label>
                <input type="color" id="pickerBorder">
            </div>
            <div class="settings-row">
                <label>Accent</label>
                <input type="color" id="pickerAccent">
            </div>
            <div class="settings-row">
                <label>Accent text</label>
                <input type="color" id="pickerAccentText">
            </div>
            <div class="settings-row">
                <label>Text</label>
                <input type="color" id="pickerText">
            </div>
            <div class="settings-row">
                <label>Call Button</label>
                <input type="color" id="pickerSuccess">
            </div>
            <div class="settings-actions">
                <button id="settingsResetBtn">Reset to defaults</button>
                <button id="settingsCloseBtn">Done</button>
            </div>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>
    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="../JavaScript/settings.js?v=2"></script>
    <script type="module" src="../JavaScript/state.js?v=2"></script>
    <script type="module" src="../JavaScript/app.js?v=2"></script>
    <script type="module" src="../JavaScript/webrtc.js?v=2"></script>
    <script type="module" src="../JavaScript/ui.js?v=2"></script>
    <script type="module" src="../JavaScript/friend.js?v=2"></script>
</body>
</html>
