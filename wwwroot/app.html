<!DOCTYPE html>
<html>
<head>
    <title>VoIP Test</title>
</head>
<body>
    <div id="app">
        <h1>VoIP Test</h1>
        <button id="connectBtn">Connect</button>

        <audio id="remoteAudio" autoplay></audio>

        <button id="micBtn">Enable Microphone</button>
        <button id="micToggle">Toggle Microphone</button>
        <button id="logoutBtn">Logout</button>
        <p id="micStatus">Mic: Not enabled</p>
        <p id="volumeLevel">Volume: 0</p>

        <div id="remoteMuteIndicator">
        Remote user state unknown
        </div>

        <div>
            <input id ="p2p" name="transportMode" type="radio" value="p2p">
            <label for="p2p">P2P</label>
            <input id ="sfu" name="transportMode" type="radio" value="sfu">
            <label for="sfu">SFU</label>
        </div>

        <div>
            <input id="usernameInput" type="text" placeholder="Username">
            <button id="addFriendBtn">Add Friend</button>
        </div>

        <h2>Incoming Friend Requests</h2>
        <ul id="friendRequestList"></ul>

        <h2>Outgoing Friend Requests</h2>
        <ul id="outgoingFriendRequestList"></ul>

        <div id="incomingCall" style="display:none;">
            <p id="callerText">Incoming call...</p>
            <button id="acceptCallBtn">Accept</button>
            <button id="rejectCallBtn">Reject</button>
        </div>
    </div>
</body>
    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="../JavaScript/state.js"></script>
    <script type="module" src="../JavaScript/app.js"></script>
    <script type="module" src="../JavaScript/webrtc.js"></script>
    <script type="module" src="../JavaScript/ui.js"></script>
</html>
