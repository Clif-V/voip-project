<!DOCTYPE html>
<html>
<head>
    <title>VoIP</title>
    <link rel="stylesheet" href="./CSS/app.css">
</head>
<body>
    <div id="app">

        <!-- Left sidebar -->
        <aside id="sidebar">
            <div id="sidebar-header">
                <span id="usernameDisplay">Loading...</span>
                <button id="logoutBtn">Logout</button>
            </div>

            <div id="addFriendSection">
                <input id="usernameInput" type="text" placeholder="Add friend by username">
                <button id="addFriendBtn">Add</button>
            </div>

            <div id="requestsSection">
                <button id="toggleRequestsBtn">
                    Friend Requests
                    <span id="requestBadge"></span>
                </button>
                <div id="requestsDropdown" style="display:none;">
                    <h4>Incoming</h4>
                    <ul id="friendRequestList"></ul>
                    <h4>Outgoing</h4>
                    <ul id="outgoingFriendRequestList"></ul>
                </div>
            </div>

            <div id="friendsListSection">
                <div id="friendsListHeader">Friends</div>
                <ul id="friendsList"></ul>
            </div>
        </aside>

        <!-- Main panel -->
        <main id="mainPanel">

            <div id="noSelectionView">
                <p>Select a friend to chat or call</p>
            </div>

            <div id="friendView">
                <div id="friendViewHeader">
                    <span id="selectedFriendName"></span>
                    <div class="transport-selector">
                        <label><input id="p2p" name="transportMode" type="radio" value="p2p"> P2P</label>
                        <label><input id="sfu" name="transportMode" type="radio" value="sfu"> SFU</label>
                    </div>
                    <button id="callBtn">Call</button>
                    <button id="endCallBtn">End Call</button>
                </div>

                <div id="callControls">
                    <button id="micBtn">Enable Mic</button>
                    <button id="micToggle">Mute / Unmute</button>
                    <p id="micStatus">Mic: Not enabled</p>
                    <p id="volumeLevel">Volume: 0</p>
                    <div id="remoteMicStatus">Remote user state unknown</div>
                </div>

                <div id="messageArea">
                    <div id="messages"></div>
                    <div id="messageInputArea">
                        <input id="messageInput" type="text" placeholder="Type a message...">
                        <button id="sendMessageBtn">Send</button>
                    </div>
                </div>
            </div>

            <!-- Incoming call overlay -->
            <div id="incomingCall">
                <p id="callerText">Incoming call...</p>
                <button id="acceptCallBtn">Accept</button>
                <button id="rejectCallBtn">Reject</button>
            </div>

        </main>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="../JavaScript/state.js"></script>
    <script type="module" src="../JavaScript/app.js"></script>
    <script type="module" src="../JavaScript/webrtc.js"></script>
    <script type="module" src="../JavaScript/ui.js"></script>
    <script type="module" src="../JavaScript/friend.js"></script>
</body>
</html>
