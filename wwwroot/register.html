<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/register.css">
    <title>Register</title>
</head>
<body>
    <div class="auth-card">
        <h2>VoIP</h2>
        <input id="username" type="text" placeholder="Username">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <p class="auth-footer" id="showPassword">Show Password</p>
        <input id="recoveryPhrase" type="password" placeholder="Recovery Phrase">
        <p class="auth-footer" id="showRecoveryPhrase">Show Recovery Phrase</p>
        <p class="auth-footer">
            <span>WARNING:</span>
            The recovery phrase is what allows you to decrypt messages. 
            If you lose this phrase you will lose access to all your messages.
        </p>
        <button id="registerBtn">Register</button>
        <p class="auth-footer">Already have an account? <a href="index.html">Login</a></p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="JavaScript/register.js"></script>
    <script type="module" src="JavaScript/ui.js"></script>
</body>
</html>
