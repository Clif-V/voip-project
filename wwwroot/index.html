<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/index.css">
    <title>Login</title>
</head>
<body>
    <div class="auth-card">
        <h2>VoIP</h2>
        <input id="username" placeholder="Username or Email" />
        <input id="password" type="password" placeholder="Password" />
        <p class="auth-footer" id="showPassword">Show Password</p>
        <button id="loginBtn">Login</button>
        <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
        <p class="auth-footer">Lost your key? <a href="recover.html">Recover</a></p>
    </div>
    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="JavaScript/login.js"></script>
    <script type="module" src="JavaScript/ui.js"></script>
</body>
</html>
