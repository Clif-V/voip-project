<!DOCTYPE html>
<html>
<head>
    <title>VoIP Test</title>
</head>
<div id="auth">
    <h2>Login</h2>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>
<div id="app" style="display:none;">
    <body>
        <h1>VoIP Test</h1>
        <button id="connectBtn">Connect</button>

        <audio id="remoteAudio" autoplay></audio>

        <button id="micBtn">Enable Microphone</button>
        <button id="micToggle">Toggle Microphone</button>
        <button onclick="logout()">Logout</button>
        <p id="micStatus">Mic: Not enabled</p>
        <p id="volumeLevel">Volume: 0</p>

        <div id="remoteMuteIndicator">
        Remote user state unknown
        </div>

        <h3>Online Users</h3>
        <div id="userList"></div>

        <div id="incomingCall" style="display:none;">
            <p id="callerText">Incoming call...</p>
            <button onclick="acceptCall()">Accept</button>
            <button onclick="rejectCall()">Reject</button>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
        <script src="JavaScript/app.js"></script>
        <script src="JavaScript/auth.js"></script>
    </body>
</div>
</html>
